<app-navbar></app-navbar>

<div class="auth-container">
  <div class="auth-card">
    <div class="card-header">
      <h2>Forgot Password</h2>
      <p class="subtitle">Enter your email to receive reset instructions</p>
    </div>

    <div *ngIf="isSuccess" class="success-state">
      <div class="icon-success">✉️</div>
      <h3>Check your email</h3>
      <p>We've sent password reset instructions to <strong>{{ form.value.email }}</strong></p>
      <a routerLink="/auth/login" class="btn-submit">Back to Login</a>
    </div>

    <form *ngIf="!isSuccess" [formGroup]="form" (ngSubmit)="onSubmit()">
      <!-- Email Field -->
      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <input 
            id="email" 
            type="email" 
            formControlName="email"
            [class.error]="form.get('email')?.invalid && form.get('email')?.touched"
            placeholder="Enter your email">
        </div>
        <div class="error-msg" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
          Please enter a valid email address
        </div>
      </div>

      <!-- Error Alert -->
      <div class="alert error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <!-- Submit Button -->
      <button type="submit" [disabled]="form.invalid || isLoading" class="btn-submit">
        <span *ngIf="!isLoading">Send Reset Link</span>
        <span *ngIf="isLoading" class="spinner-sm"></span>
      </button>

      <div class="footer-links">
        <a routerLink="/auth/login">Back to Login</a>
      </div>
    </form>
  </div>
</div>
