<app-navbar></app-navbar>
<section class="bookings">
  <header class="header">
    <div>
      <p class="eyebrow">My bookings</p>
      <h1>Booking history</h1>
      <p class="subtitle">Track your payments and upcoming stays.</p>
    </div>
    <div class="filters">
      <label class="filter">
        Status
        <select [(ngModel)]="statusFilter" (change)="applyFilters()">
          <option *ngFor="let option of statusOptions" [ngValue]="option.value">
            {{ option.label }}
          </option>
        </select>
      </label>
      <label class="filter">
        Check-in from
        <input type="date" [(ngModel)]="checkInFrom" (change)="applyFilters()">
      </label>
      <label class="filter">
        Check-in to
        <input type="date" [(ngModel)]="checkInTo" (change)="applyFilters()">
      </label>
    </div>
  </header>

  <div class="state loading" *ngIf="isLoading">Loading bookings...</div>
  <div class="state error" *ngIf="!isLoading && errorMessage">{{ errorMessage }}</div>
  <app-empty-state
    *ngIf="!isLoading && !errorMessage && bookings.length === 0"
    message="No bookings found.">
  </app-empty-state>

  <div class="table" *ngIf="!isLoading && bookings.length > 0">
    <div class="row header">
      <span>Booking</span>
      <span>Dates</span>
      <span>Status</span>
      <span>Total</span>
      <span></span>
    </div>

    <div class="row" *ngFor="let booking of bookings; trackBy: trackById">
      <span class="cell" data-label="Booking">#{{ booking.id }}</span>
      <span class="cell" data-label="Dates">{{ booking.checkInDate || '-' }} → {{ booking.checkOutDate || '-' }}</span>
      <span class="cell status" data-label="Status">
        <app-status-badge [status]="booking.status"></app-status-badge>
      </span>
      <span class="cell" data-label="Total">{{ booking.totalAmount | currencyIdr }}</span>
      <div class="cell actions">
        <a class="ghost" [routerLink]="['/bookings', booking.id]">Detail</a>
        <a class="ghost" *ngIf="booking.status === 'PAYMENT_PENDING'" [routerLink]="['/bookings', booking.id, 'checkout']">Upload proof</a>
      </div>
    </div>
  </div>

  <app-pagination
    *ngIf="!isLoading"
    [pageNumber]="page.number"
    [totalPages]="page.totalPages"
    (pageChange)="loadBookings($event)">
  </app-pagination>
</section>
